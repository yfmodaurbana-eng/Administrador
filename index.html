<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin Productos</title>

<style>
body{
  background:#0f0f0f;
  font-family:Arial;
  padding:20px;
  color:white;
}

.admin-box{
  max-width:700px;
  margin:auto;
  background:#171616;
  padding:20px;
  border-radius:14px;
}

h1{
  text-align:center;
  color:#ABAA57;
  margin-bottom:20px;
  font-size:22px;
}

input, select, textarea{
  width:100%;
  margin-top:8px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2a2a2a;
  color:white;
}

button{
  width:100%;
  margin-top:12px;
  background:#ABAA57;
  color:black;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

textarea{
  min-height:320px;
  resize:vertical;
}
</style>
</head>

<body>

<div class="admin-box">
  <h1>Panel Admin Productos</h1>

  <input id="titulo" placeholder="Nombre producto">
  <input id="precio" placeholder="Precio (ej: 15€)">
  <input id="referencia" placeholder="Referencia">

  <input id="imgBlanco" placeholder="URL Blanco (varias separadas por comas)">
  <input id="imgNegro" placeholder="URL Negro (varias separadas por comas)">
  <input id="imgGris" placeholder="URL Gris (varias separadas por comas)">
  <input id="imgRojo" placeholder="URL Rojo (varias separadas por comas)">
  <input id="imgAzul" placeholder="URL Azul (varias separadas por comas)">
  <input id="imgVerde" placeholder="URL Verde (varias separadas por comas)">
  <input id="imgBeige" placeholder="URL Beige (varias separadas por comas)">
  <input id="imgRosa" placeholder="URL Rosa (varias separadas por comas)">
  <input id="imgMarron" placeholder="URL Marrón (varias separadas por comas)">
  <input id="imgAmarillo" placeholder="URL Amarillo (varias separadas por comas)">

  <input id="tallas" placeholder="Tallas (ej: S,M,L o 40,41,42)">
  <input id="telefono" placeholder="WhatsApp (34600000000)">

  <button onclick="generarCodigo()">Generar producto</button>

  <textarea id="resultado" placeholder="Aquí aparecerá el código listo para copiar"></textarea>
  <button onclick="copiarCodigo()">📋 Copiar código</button>
</div>

<script>
function generarCodigo(){

const titulo = document.getElementById("titulo").value;
const precio = document.getElementById("precio").value;
const referencia = document.getElementById("referencia").value;
const telefono = document.getElementById("telefono").value.replace(/\D/g, '');
const tallasInput = document.getElementById("tallas").value;

const colores = [
  ["Blanco", document.getElementById("imgBlanco").value],
  ["Negro", document.getElementById("imgNegro").value],
  ["Gris", document.getElementById("imgGris").value],
  ["Rojo", document.getElementById("imgRojo").value],
  ["Azul", document.getElementById("imgAzul").value],
  ["Verde", document.getElementById("imgVerde").value],
  ["Beige", document.getElementById("imgBeige").value],
  ["Rosa", document.getElementById("imgRosa").value],
  ["Marrón", document.getElementById("imgMarron").value],
  ["Amarillo", document.getElementById("imgAmarillo").value]
].filter(c => c[1] !== "");

let opcionesColor = '<option value="" selected>🎨 Color</option>';
let arrayProductos = '';
let primeraImagen = '';

colores.forEach((c) => {
  opcionesColor += `<option value="${c[0]}">${c[0]}</option>`;
  const imagenes = c[1].split(",");

  imagenes.forEach((img) => {
    const limpia = img.trim();
    if(limpia !== ""){
      if(primeraImagen === '') primeraImagen = limpia;
      arrayProductos += `${arrayProductos !== '' ? ',' : ''}{color:"${c[0]}",imagen:"${limpia}"}`;
    }
  });
});

// tallas dinámicas
let opcionesTalla = '<option value="" selected>🏷️ Talla</option>';
if(tallasInput.trim() !== ""){
  tallasInput.split(",").forEach(t => {
    const limpia = t.trim();
    if(limpia !== ""){
      opcionesTalla += `<option value="${limpia}">${limpia}</option>`;
    }
  });
}

const codigo = `<iframe srcdoc='

<div style="max-width:320px;font-family:Arial;padding:12px;position:relative;
background:linear-gradient(135deg,#1a1a1a,#2a2a2a,#111);
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.5);">

<div style="width:100%;height:220px;border-radius:10px;
background:linear-gradient(135deg,#111,#1c1c1c);
display:flex;align-items:center;justify-content:center;overflow:hidden;">
  <img id="img" src="${primeraImagen}" style="max-width:100%;max-height:100%;object-fit:contain;">
</div>

<button onclick="prev()" style="position:absolute;top:100px;left:6px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:28px;height:28px;">‹</button>
<button onclick="next()" style="position:absolute;top:100px;right:6px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:28px;height:28px;">›</button>

<h3 style="margin:10px 0 2px;font-size:16px;color:#ffffff;">💎${titulo} ${precio}</h3>
<p style="font-size:11px;color:#bdbdbd;margin:2px 0;">Ref: ${referencia}</p>

<select id="color" onchange="cambiarColor()" style="width:100%;margin-top:6px;background:#2a2a2a;color:white;border:none;border-radius:6px;padding:8px;">
${opcionesColor}
</select>

<select id="talla" style="width:100%;margin-top:5px;background:#2a2a2a;color:white;border:none;border-radius:6px;padding:8px;">
${opcionesTalla}
</select>

<details style="color:#e0e0e0;margin-top:6px;font-size:12px;">
<summary>🚨📦 Dirección envío</summary>
<input id="nombre" placeholder="Nombre" style="width:100%;margin-top:5px;background:#1f1f1f;color:white;border:none;padding:8px;border-radius:6px;">
<input id="telefonoCliente" placeholder="Teléfono" style="width:100%;margin-top:5px;background:#1f1f1f;color:white;border:none;padding:8px;border-radius:6px;">
<input id="direccion" placeholder="Dirección" style="width:100%;margin-top:5px;background:#1f1f1f;color:white;border:none;padding:8px;border-radius:6px;">
<input id="ciudad" placeholder="Ciudad" style="width:100%;margin-top:5px;background:#1f1f1f;color:white;border:none;padding:8px;border-radius:6px;">
<input id="cp" placeholder="CP" style="width:100%;margin-top:5px;background:#1f1f1f;color:white;border:none;padding:8px;border-radius:6px;">
</details>

<button onclick="enviar()" style="width:100%;margin-top:10px;background:#25D366;color:white;padding:12px;border:none;border-radius:8px;font-weight:bold;">
💬 Comprar por WhatsApp
</button>

</div>

<script>
var i = 0;
var productos = [${arrayProductos}];

function actualizarTodo(){
  if(productos.length > 0){
    document.getElementById("img").src = productos[i].imagen;
    document.getElementById("color").value = productos[i].color;
  }
}

function next(){
  if(productos.length === 0) return;
  i = (i + 1) % productos.length;
  actualizarTodo();
}

function prev(){
  if(productos.length === 0) return;
  i = (i - 1 + productos.length) % productos.length;
  actualizarTodo();
}

function cambiarColor(){
  var c = document.getElementById("color").value;
  for(var x = 0; x < productos.length; x++){
    if(productos[x].color === c){
      i = x;
      actualizarTodo();
      break;
    }
  }
}

function enviar(){
  var color = document.getElementById("color").value;
  var talla = document.getElementById("talla").value;
  var nombre = document.getElementById("nombre").value;
  var telefonoCliente = document.getElementById("telefonoCliente").value;
  var direccion = document.getElementById("direccion").value;
  var ciudad = document.getElementById("ciudad").value;
  var cp = document.getElementById("cp").value;

  var mensaje =
  "🛍️ *NUEVO PEDIDO*\\n\\n" +
  "Producto: ${titulo}\\n" +
  "Precio: ${precio}\\n" +
  "Referencia: ${referencia}\\n\\n" +
  "Color: " + color + "\\n" +
  "Talla: " + talla + "\\n\\n" +
  "Nombre: " + nombre + "\\n" +
  "Teléfono: " + telefonoCliente + "\\n" +
  "Dirección: " + direccion + "\\n" +
  "Ciudad: " + ciudad + "\\n" +
  "CP: " + cp;

  window.open("https://wa.me/${telefono}?text=" + encodeURIComponent(mensaje));
}

actualizarTodo();

<\/script>

' style="width:100%;height:760px;border:none;"></iframe>`;

document.getElementById("resultado").value = codigo;
}

function copiarCodigo(){
  const textarea = document.getElementById("resultado");
  textarea.select();
  document.execCommand("copy");
  alert("✅ Código copiado");
}
</script>

</body>
</html>
